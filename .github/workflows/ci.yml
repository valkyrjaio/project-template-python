# NOTE: The `_<tool>-python.yml` reusable workflows referenced below do not yet
# exist in valkyrjaio/.github — they must be authored org-side before CI is green.
# They are pinned to @master until published, then pin to a commit SHA like the
# language-agnostic checks below.
name: CI

on:
  push:
    branches: [ 'master', '*.x' ]
  pull_request:
    branches: [ 'master', '*.x' ]

permissions:
  pull-requests: write
  contents: read

jobs:
  commit-message-check:
    name: Commit Message Check
    if: github.event_name == 'pull_request'
    uses: valkyrjaio/.github/.github/workflows/_commit-message-check.yml@bcbf9696bd9a7fd71abcf4d00d3420cc949c98e1
    secrets: inherit

  trailing-newline-check:
    name: Trailing Newline Check
    if: github.event_name == 'pull_request'
    uses: valkyrjaio/.github/.github/workflows/_trailing-newline-check.yml@bcbf9696bd9a7fd71abcf4d00d3420cc949c98e1
    permissions:
      pull-requests: write
      contents: read
    secrets: inherit

  ruff:
    name: Ruff
    uses: valkyrjaio/.github/.github/workflows/_ruff-python.yml@master
    with:
      ci-directory: .github/ci/ruff
      paths: |
        ci:
          - '.github/ci/ruff/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/ruff/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
          - 'tests/**/*.py'
          - 'pyproject.toml'
    secrets: inherit

  mypy:
    name: mypy
    uses: valkyrjaio/.github/.github/workflows/_mypy-python.yml@master
    with:
      ci-directory: .github/ci/mypy
      paths: |
        ci:
          - '.github/ci/mypy/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/mypy/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
          - 'tests/**/*.py'
          - 'pyproject.toml'
    secrets: inherit

  import-linter:
    name: import-linter
    uses: valkyrjaio/.github/.github/workflows/_import-linter-python.yml@master
    with:
      ci-directory: .github/ci/importlinter
      paths: |
        ci:
          - '.github/ci/importlinter/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/importlinter/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
          - 'pyproject.toml'
    secrets: inherit

  bandit:
    name: Bandit
    uses: valkyrjaio/.github/.github/workflows/_bandit-python.yml@master
    with:
      ci-directory: .github/ci/bandit
      paths: |
        ci:
          - '.github/ci/bandit/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/bandit/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
    secrets: inherit

  pytest:
    name: pytest
    uses: valkyrjaio/.github/.github/workflows/_pytest-python.yml@master
    with:
      ci-directory: .github/ci/pytest
      paths: |
        ci:
          - '.github/ci/pytest/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/pytest/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
          - 'tests/**/*.py'
          - 'pyproject.toml'
    secrets: inherit
