name: CI

on:
  push:
    branches: [ 'master', '*.x' ]
  pull_request:
    branches: [ 'master', '*.x' ]

permissions:
  pull-requests: write
  contents: read

jobs:
  commit-message-check:
    name: Commit Message Check
    if: github.event_name == 'pull_request'
    uses: valkyrjaio/.github/.github/workflows/_commit-message-check.yml@983eb086a57533c52b7ce86a29b2d537aad838ed
    secrets: inherit

  trailing-newline-check:
    name: Trailing Newline Check
    if: github.event_name == 'pull_request'
    uses: valkyrjaio/.github/.github/workflows/_trailing-newline-check.yml@983eb086a57533c52b7ce86a29b2d537aad838ed
    permissions:
      pull-requests: write
      contents: read
    secrets: inherit

  ruff:
    name: Ruff
    uses: valkyrjaio/.github/.github/workflows/_ruff-python.yml@983eb086a57533c52b7ce86a29b2d537aad838ed
    with:
      ci-directory: .github/ci/ruff
      paths: |
        ci:
          - '.github/ci/ruff/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/ruff/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
          - 'tests/**/*.py'
          - 'pyproject.toml'
    secrets: inherit

  mypy:
    name: mypy
    uses: valkyrjaio/.github/.github/workflows/_mypy-python.yml@983eb086a57533c52b7ce86a29b2d537aad838ed
    with:
      ci-directory: .github/ci/mypy
      paths: |
        ci:
          - '.github/ci/mypy/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/mypy/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
          - 'tests/**/*.py'
          - 'pyproject.toml'
    secrets: inherit

  import-linter:
    name: import-linter
    uses: valkyrjaio/.github/.github/workflows/_import-linter-python.yml@983eb086a57533c52b7ce86a29b2d537aad838ed
    with:
      ci-directory: .github/ci/importlinter
      paths: |
        ci:
          - '.github/ci/importlinter/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/importlinter/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
          - 'pyproject.toml'
    secrets: inherit

  bandit:
    name: Bandit
    uses: valkyrjaio/.github/.github/workflows/_bandit-python.yml@983eb086a57533c52b7ce86a29b2d537aad838ed
    with:
      ci-directory: .github/ci/bandit
      paths: |
        ci:
          - '.github/ci/bandit/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/bandit/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
    secrets: inherit

  pytest:
    name: pytest
    uses: valkyrjaio/.github/.github/workflows/_pytest-python.yml@983eb086a57533c52b7ce86a29b2d537aad838ed
    with:
      ci-directory: .github/ci/pytest
      paths: |
        ci:
          - '.github/ci/pytest/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/pytest/**'
          - '.github/workflows/ci.yml'
          - 'src/**/*.py'
          - 'tests/**/*.py'
          - 'pyproject.toml'
    secrets: inherit
