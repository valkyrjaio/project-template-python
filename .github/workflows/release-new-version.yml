name: Create a New Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc

run-name: "Release ${{ inputs.bump }} bump on ${{ github.ref_name }}"

permissions:
  contents: write

jobs:
  release:
    uses: valkyrjaio/.github/.github/workflows/_create-python-release.yml@983eb086a57533c52b7ce86a29b2d537aad838ed
    secrets: inherit
    with:
      bump: ${{ inputs.bump }}
      dependencies: |
        [
          {"name": "Ruff",           "directory": ".github/ci/ruff"},
          {"name": "mypy",           "directory": ".github/ci/mypy"},
          {"name": "Bandit",         "directory": ".github/ci/bandit"},
          {"name": "import-linter",  "directory": ".github/ci/importlinter"},
          {"name": "pytest",         "directory": ".github/ci/pytest"}
        ]
      info-file-path: src/valkyrja/template/constant/template_info.py
      info-file-name: TemplateInfo
